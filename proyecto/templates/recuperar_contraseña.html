{% extends "base.html" %}
{% block title %}Recuperar contraseña{% endblock %}

{% block contenido %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4 shadow" style="border-radius:10px;">
            
            <h3 class="mb-3">Recuperar contraseña</h3>
            <p>Ingresa tu correo y te enviaremos instrucciones.</p>

            <form method="post" action="{{ url_for('recuperar') }}">
                <input class="form-control mb-3" type="email" name="correo" placeholder="Correo electrónico" required>

                <button class="btn btn-primary w-100">Enviar</button>
            </form>

        </div>
    </div>
</div>
{% endblock %}
