{% extends "base.html" %}
{% block title %}Iniciar sesión - NutriApp{% endblock %}

{% block contenido %}
<div class="row align-items-center" style="min-height: 80vh;">
    
    <div class="col-md-6 text-center text-md-start">
        <h1 style="color:#1877f2; font-weight:bold; font-size:60px;">Gestor De Tareas</h1>
        <p style="font-size:20px;">
            Gestiona Con Seguridad Tus Tareas.
        </p>
    </div>

    <div class="col-md-6">
        <div class="card p-4 shadow" style="border-radius:10px;">
            
            <form action="{{ url_for('login') }}" method="post">
                <input class="form-control mb-3" type="email" name="correo" placeholder="Correo electrónico" required>

                <input class="form-control mb-3" type="password" name="contraseña" placeholder="Contraseña" required>

                <button class="btn btn-primary w-100 mb-3" type="submit">Iniciar sesión</button>

                <div class="text-center">
                    <a href="{{ url_for('recuperar') }}">¿Olvidaste tu contraseña?</a>
                </div>

                <hr>

                <div class="text-center">
                    <a href="{{ url_for('formulario') }}" class="btn btn-success">
                        Crear cuenta nueva
                    </a>
                </div>
            </form>

        </div>
    </div>
</div>
{% endblock %}
